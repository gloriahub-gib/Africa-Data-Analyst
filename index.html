<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Data Decision Platform</title>
    
    <!-- Liens de sécurité officiels pour charger le design et les icônes sur internet -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    
    <style>
        :root {
            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f8f9fa;
            --color-border-secondary: #dee2e6;
            --color-border-tertiary: #e9ecef;
            --color-text-primary: #212529;
            --color-text-secondary: #6c757d;
            --color-text-tertiary: #adb5bd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background-color: #f4f6f9; padding: 20px; color: var(--color-text-primary); }

        .add-header {
            background: linear-gradient(135deg, #0C447C 0%, #185FA5 60%, #1D9E75 100%);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem 1.75rem;
            margin-bottom: 1.25rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .add-logo {
            width: 48px; height: 48px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--border-radius-md);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .add-logo i { font-size: 24px; color: #fff; }
        .add-header-text h1 { font-size: 18px; font-weight: 500; color: #fff; margin-bottom: 2px; }
        .add-header-text p { font-size: 13px; color: rgba(255,255,255,0.75); }

        .section-card {
            background: var(--color-background-primary);
            border: 0.5px solid var(--color-border-tertiary);
            border-radius: var(--border-radius-lg);
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
            display: flex; align-items: center; gap: 8px;
        }

        .sector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
            margin-bottom: 1rem;
        }
        .sector-btn {
            border: 0.5px solid var(--color-border-secondary);
            border-radius: var(--border-radius-md);
            background: var(--color-background-primary);
            padding: 10px 12px;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.15s, background 0.15s;
        }
        .sector-btn:hover { background: var(--color-background-secondary); }
        .sector-btn.active {
            border-color: #185FA5;
            background: #E6F1FB;
        }
        .sector-btn .s-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .sector-btn .s-label { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }

        textarea.data-input {
            width: 100%;
            min-height: 120px;
            border: 0.5px solid var(--color-border-secondary);
            border-radius: var(--border-radius-md);
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            resize: vertical;
        }
        .analyze-btn {
            width: 100%;
            background: #0C447C;
            color: #fff;
            border: none;
            border-radius: var(--border-radius-md);
            padding: 13px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="add-header">
  <div class="add-logo">
    <i class="ti ti-chart-dots-3"></i>
  </div>
  <div class="add-header-text">
    <h1>Africa Data Decision</h1>
    <p>Moteur d'analyse stratégique · Marché béninois</p>
  </div>
</div>

<div id="form-section">
  <div class="section-card">
    <div class="section-title"><i class="ti ti-building-store"></i> Secteur d'activité</div>
    <div class="sector-grid">
      <button type="button" class="sector-btn active">
        <span class="s-icon">🛡️</span><span class="s-label">GAB Assurance</span>
      </button>
      <button type="button" class="sector-btn">
        <span class="s-icon">🛒</span><span class="s-label">Commerce / Négoce</span>
      </button>
      <button type="button" class="sector-btn">
        <span class="s-icon">💊</span><span class="s-label">Santé / Pharmacie</span>
      </button>
      <button type="button" class="sector-btn">
        <span class="s-icon">🌾</span><span class="s-label">Agro-alimentaire</span>
      </button>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title"><i class="ti ti-file-text"></i> Vos données à analyser</div>
    <textarea class="data-input" placeholder="Collez ici vos données de veille commerciale ou les alertes Feedly..."></textarea>
    <button type="button" class="analyze-btn">
        <i class="ti ti-brain"></i> Lancer l'Analyse Stratégique
    </button>
  </div>
</div>

</body>
</html>

</script>
</body>
</html>
